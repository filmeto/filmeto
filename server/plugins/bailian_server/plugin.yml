name: Bailian Server
version: 1.4.0
description: Alibaba Cloud Bailian (DashScope) integration with LLM chat and AIGC tools
author: Filmeto Team
engine: bailian

# QML UI configuration (optional - enables custom QML config widget)
ui:
  config_widget: qml/config/ConfigWidget.qml
  imports:
    - QtQuick
    - QtQuick.Controls
    - QtQuick.Layouts

requirements:
  python: ">=3.9"
  packages:
    - pillow>=9.0.0
    - dashscope>=1.14.0

# Abilities exposed by this plugin (alias: legacy key ``tools``)
abilities:
  - name: text2image
    description: Generate image from text prompt using Wanx model
    parameters:
      - name: prompt
        type: string
        required: true
        description: Text prompt for generation

      - name: model
        type: string
        required: false
        default: "wanx2.1-t2i-turbo"
        description: Model to use (e.g., wanx2.1-t2i-turbo, wanx2.1-t2i-plus)

      - name: width
        type: integer
        required: false
        default: 1024
        min: 512
        max: 2048
        description: Image width

      - name: height
        type: integer
        required: false
        default: 1024
        min: 512
        max: 2048
        description: Image height

  - name: image2image
    description: Transform image based on text prompt
    parameters:
      - name: prompt
        type: string
        required: true
        description: Text prompt for transformation

      - name: model
        type: string
        required: false
        default: "wanx2.1-i2i-turbo"
        description: Model to use for image-to-image

  - name: imageedit
    description: Edit image (inpainting, outpainting) using Qwen-Image-Edit model
    parameters:
      - name: prompt
        type: string
        required: true
        description: Text prompt for image editing

      - name: model
        type: string
        required: false
        default: "qwen-image-edit-max"
        description: Model to use for image editing (e.g., qwen-image-edit-max, qwen-image-edit-plus)

      - name: n
        type: integer
        required: false
        default: 1
        description: Number of images to generate

  - name: chat_completion
    description: LLM chat completion via DashScope OpenAI-compatible API
    parameters:
      - name: model
        type: string
        required: false
        default: qwen-max
        description: Model name (e.g. qwen-max, qwen-plus, qwen-turbo, qwen2.5-72b-instruct)

      - name: messages
        type: array
        required: true
        description: Chat messages in OpenAI format

      - name: temperature
        type: float
        required: false
        default: 0.7
        min: 0.0
        max: 2.0
        description: Sampling temperature

      - name: max_tokens
        type: integer
        required: false
        default: 4096
        description: Maximum tokens in response

      - name: stream
        type: boolean
        required: false
        default: false
        description: Enable streaming response

# Chat / LLM capability declaration
# Models are loaded dynamically from models.yml
chat:
  provider: dashscope
  default_endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # See models.yml for full model list
  # DashScope models: qwen-max, qwen-plus, qwen-turbo, etc.
  # Coding Plan models (prefix: code_plan:): qwen3.5-plus, kimi-k2.5, glm-5, MiniMax-M2.5

startup:
  timeout: 30
  health_check: true

execution:
  timeout: 300
  max_retries: 3

# Configuration schema - Simplified to only require API Key
config_schema:
  fields:
    - name: api_key
      label: API Key
      type: password
      required: true
      default: ""
      description: "DashScope API Key (获取方式: 阿里云控制台 -> DashScope -> API-KEY管理)"
      placeholder: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

    - name: coding_plan_enabled
      label: Enable Coding Plan
      type: boolean
      required: false
      default: false
      description: "Enable Coding Plan for AI coding assistant (requires separate subscription)"

    - name: coding_plan_api_key
      label: Coding Plan API Key
      type: password
      required: false
      default: ""
      description: "Coding Plan API Key (format: sk-sp-xxxxx, get from Coding Plan page)"
      placeholder: "sk-sp-xxxxxxxx"

    - name: default_model
      label: Default Chat Model
      type: string
      required: false
      default: "qwen-max"
      description: Default model for chat completions
      placeholder: "qwen-max"

    - name: default_image_model
      label: Default Image Model
      type: string
      required: false
      default: "wanx2.1-t2i-turbo"
      description: Default model for text-to-image generation
      placeholder: "wanx2.1-t2i-turbo"
