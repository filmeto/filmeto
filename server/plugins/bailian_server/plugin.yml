name: Bailian Server
version: 1.4.0
description: Alibaba Cloud Bailian (DashScope) integration with LLM chat and AIGC tools
author: Filmeto Team
engine: bailian

requirements:
  python: ">=3.9"
  packages:
    - pillow>=9.0.0
    - litellm>=1.0.0

# Define multiple tools supported by this plugin
tools:
  - name: text2image
    description: Generate image from text prompt using Wanx model
    parameters:
      - name: prompt
        type: string
        required: true
        description: Text prompt for generation

      - name: model
        type: string
        required: false
        default: "wanx2.1-t2i-turbo"
        description: Model to use (e.g., wanx2.1-t2i-turbo, wanx2.1-t2i-plus)

      - name: width
        type: integer
        required: false
        default: 1024
        min: 512
        max: 2048
        description: Image width

      - name: height
        type: integer
        required: false
        default: 1024
        min: 512
        max: 2048
        description: Image height

  - name: image2image
    description: Transform image based on text prompt
    parameters:
      - name: prompt
        type: string
        required: true
        description: Text prompt for transformation

      - name: model
        type: string
        required: false
        default: "wanx2.1-i2i-turbo"
        description: Model to use for image-to-image

  - name: chat_completion
    description: LLM chat completion via DashScope OpenAI-compatible API
    parameters:
      - name: model
        type: string
        required: false
        default: qwen-max
        description: Model name (e.g. qwen-max, qwen-plus, qwen-turbo, qwen2.5-72b-instruct)

      - name: messages
        type: array
        required: true
        description: Chat messages in OpenAI format

      - name: temperature
        type: float
        required: false
        default: 0.7
        min: 0.0
        max: 2.0
        description: Sampling temperature

      - name: max_tokens
        type: integer
        required: false
        default: 4096
        description: Maximum tokens in response

      - name: stream
        type: boolean
        required: false
        default: false
        description: Enable streaming response

# Chat / LLM capability declaration
chat:
  provider: dashscope
  default_endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  default_models:
    - qwen-max
    - qwen-plus
    - qwen-turbo
    - qwen2.5-72b-instruct
    - qwen2.5-32b-instruct
    - qwen-long
    - qwen-vl-max
    - qwen-vl-plus

startup:
  timeout: 30
  health_check: true

execution:
  timeout: 300
  max_retries: 3

# Configuration schema - Simplified to only require API Key
config_schema:
  fields:
    - name: api_key
      label: API Key
      type: password
      required: true
      default: ""
      description: "DashScope API Key (获取方式: 阿里云控制台 -> DashScope -> API-KEY管理)"
      placeholder: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

    - name: default_model
      label: Default Chat Model
      type: string
      required: false
      default: "qwen-max"
      description: Default model for chat completions
      placeholder: "qwen-max"

    - name: default_image_model
      label: Default Image Model
      type: string
      required: false
      default: "wanx2.1-t2i-turbo"
      description: Default model for text-to-image generation
      placeholder: "wanx2.1-t2i-turbo"
